name: Bundle Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag)'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache pub dependencies
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Run bundling script
        shell: pwsh
        run: ./scripts/bundle-windows.ps1

      - name: List build output
        shell: pwsh
        run: |
          Get-ChildItem build/dist -Recurse | Select-Object FullName, Length

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: xkg-bundle-windows
          path: build/dist/xkg-bundle-*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: xkg-bundle-windows
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
