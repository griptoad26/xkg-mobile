name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        cache: true
    
    - name: Create Flutter project
      run: |
        ls -la
        rm -rf app android
        flutter create --org com.xkg --project-name xkg_mobile --platforms=android xkg_app
        cp -r lib/* xkg_app/lib/
        cp pubspec.yaml xkg_app/
    
    - name: Build
      working-directory: xkg_app
      run: |
        flutter pub get
        flutter build apk --debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: xkg_app/build/app/outputs/flutter-apk/app-debug.apk
