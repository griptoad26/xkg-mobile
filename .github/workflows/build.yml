name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
    
    - name: Create project
      run: |
        rm -rf build_app
        mkdir build_app
        cd build_app
        flutter create --platforms=android .
        cd ..
        cp -r lib/* build_app/lib/
        cp pubspec.yaml build_app/
    
    - name: Build
      run: |
        cd build_app
        flutter pub get
        flutter build apk --debug
    
    - uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: build_app/build/app/outputs/flutter-apk/app-debug.apk
