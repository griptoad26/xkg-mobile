name: Build XKG Windows Desktop (Unified Bundle)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout XKG Mobile repo
      uses: actions/checkout@v4
    
    - name: Download XKG Server (public repo - no auth needed)
      run: |
        curl -sL https://github.com/griptoad26/x-knowledge-graph/archive/refs/heads/main.zip -o server.zip
        powershell -Command "Expand-Archive -Path server.zip -DestinationPath . -Force"
        dir
        powershell -Command "Get-ChildItem -Directory | Select-Object Name"
        $dir = Get-ChildItem -Directory | Where-Object { $_.Name -match 'x-knowledge-graph' } | Select-Object -First 1
        if ($dir) { Rename-Item $dir.Name -NewName xkg-server -Force }
      shell: pwsh
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      continue-on-error: true
    
    - name: Install deps
      run: |
        flutter pub get
        pip install --timeout=120 flask flask-cors waitress pyinstaller networkx pandas numpy requests
    
    - name: Build Flutter Windows
      run: flutter build windows --release
    
    - name: Build XKG Server EXE
      shell: pwsh
      run: |
        if (Test-Path "xkg-server\start_waitress.py") {
            Write-Host "Building XKG Server..."
            pip install flask flask-cors waitress requests networkx pandas numpy
            Set-Location xkg-server
            pyinstaller --onefile --name XKnowledgeGraphServer --hidden-import flask --hidden-import flask_cors --hidden-import waitress --hidden-import werkzeug --hidden-import jinja2 --hidden-import markupsafe --hidden-import networkx --hidden-import pandas --hidden-import numpy --hidden-import requests start_waitress.py
        } else {
            Write-Host "ERROR: xkg-server not found at expected path"
            Get-ChildItem
        }
      continue-on-error: true
    
    - name: Package Bundle
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path xkg-desktop-bundle | Out-Null
        
        # Copy Flutter build
        Get-ChildItem build/windows/x64/runner/Release -Recurse -ErrorAction SilentlyContinue | Copy-Item -Destination xkg-desktop-bundle\ -ErrorAction SilentlyContinue
        
        # Copy server
        if (Test-Path "xkg-server\dist\XKnowledgeGraphServer.exe") {
            Copy-Item "xkg-server\dist\XKnowledgeGraphServer.exe" xkg-desktop-bundle\ -ErrorAction SilentlyContinue
        }
        if (Test-Path "xkg-server\start_waitress.py") {
            Copy-Item "xkg-server\start_waitress.py" xkg-desktop-bundle\ -ErrorAction SilentlyContinue
        }
        
        # Launcher scripts
        $serverBat = if (Test-Path "xkg-desktop-bundle\XKnowledgeGraphServer.exe") {
            "@echo off`nstart `\"\"`" XKnowledgeGraphServer.exe`necho XKG Server started on port 18050`npause"
        } else {
            "@echo off`necho XKG Server not found. Install Python 3.11+ then run:`npip install flask flask-cors waitress networkx pandas numpy`npython start_waitress.py`npause"
        }
        $serverBat | Out-File -FilePath xkg-desktop-bundle\START-SERVER.bat -Encoding ASCII
        
        "@echo off`nstart `\"\"`" xkg_mobile.exe`necho XKG App launched!`npause" | Out-File -FilePath xkg-desktop-bundle\START-APP.bat -Encoding ASCII
        "@echo off`necho ========================================`necho   XKG Desktop - Knowledge Graph`necho ========================================`necho.`necho 1. Run START-SERVER.bat first`necho 2. Then run START-APP.bat`npause" | Out-File -FilePath xkg-desktop-bundle\START-HERE.bat -Encoding ASCII
        
        @"
XKG Desktop Bundle
==================
1. Run START-SERVER.bat to start the knowledge graph server on port 18050
2. Run START-APP.bat to launch the XKG desktop app
3. App connects to server at http://localhost:18050
"@ | Out-File -FilePath xkg-desktop-bundle\README.txt -Encoding ASCII
        
        Write-Host "Bundle files:"
        Get-ChildItem xkg-desktop-bundle | Format-Table Name, Length -AutoSize
    
    - name: Upload bundle
      uses: actions/upload-artifact@v4
      with:
        name: xkg-desktop-windows-bundle
        path: xkg-desktop-bundle/**
        retention-days: 30
