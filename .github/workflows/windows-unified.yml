name: Build XKG Windows Desktop (Unified Bundle)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/windows-unified.yml'
      - 'xkg-server/**'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout XKG Mobile (with xkg-server included)
      uses: actions/checkout@v4
      with:
        path: xkg-mobile
        fetch-depth: 1
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        flutter pub get
        pip install --timeout=120 flask flask-cors waitress pyinstaller networkx pandas numpy requests
    
    - name: Build Flutter Windows
      run: |
        cd xkg-mobile
        flutter build windows --release
    
    - name: Build XKG Server EXE
      shell: pwsh
      run: |
        Set-Location xkg-mobile\xkg-server
        if (!(Test-Path "start_waitress.py")) {
            Write-Host "ERROR: start_waitress.py not found"
            exit 1
        }
        Write-Host "Building XKG Server..."
        pyinstaller --onefile --name XKnowledgeGraphServer --hidden-import flask --hidden-import flask_cors --hidden-import waitress --hidden-import werkzeug --hidden-import jinja2 --hidden-import markupsafe --hidden-import networkx --hidden-import pandas --hidden-import numpy --hidden-import requests start_waitress.py
        Set-Location ..
        if (Test-Path "xkg-mobile\xkg-server\dist\XKnowledgeGraphServer.exe") {
            $size = [math]::Round((Get-Item "xkg-mobile\xkg-server\dist\XKnowledgeGraphServer.exe").Length / 1MB, 1)
            Write-Host "Server EXE built: ${size}MB"
        } else {
            Write-Host "ERROR: Server exe not found"
            exit 1
        }
    
    - name: Package Bundle
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path xkg-desktop-bundle | Out-Null
        Get-ChildItem xkg-mobile/build/windows/x64/runner/Release -Recurse -ErrorAction SilentlyContinue | Copy-Item -Destination xkg-desktop-bundle\ -ErrorAction SilentlyContinue
        Copy-Item "xkg-mobile\xkg-server\dist\XKnowledgeGraphServer.exe" xkg-desktop-bundle\
        Copy-Item "xkg-mobile\xkg-server\start_waitress.py" xkg-desktop-bundle\
        
        "@`n@echo off`nstart `"`" XKnowledgeGraphServer.exe`necho XKG Server running on port 18050`npause`n"@ | Out-File -FilePath xkg-desktop-bundle\START-SERVER.bat -Encoding ASCII
        "@`n@echo off`nstart `"`" xkg_mobile.exe`npause`n"@ | Out-File -FilePath xkg-desktop-bundle\START-APP.bat -Encoding ASCII
        "@`nXKG Desktop Bundle`n=================`n1. START-SERVER.bat`n2. START-APP.bat`n"@ | Out-File -FilePath xkg-desktop-bundle\README.txt -Encoding ASCII
        
        Get-ChildItem xkg-desktop-bundle | Format-Table Name, @{N='MB';E={[math]::Round($_.Length/1MB,2)}} -AutoSize
    
    - name: Upload bundle
      uses: actions/upload-artifact@v4
      with:
        name: xkg-desktop-windows-bundle
        path: xkg-desktop-bundle/**
        retention-days: 30
