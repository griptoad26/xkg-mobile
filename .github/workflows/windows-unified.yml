name: Build XKG Windows Desktop (Unified Bundle)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/windows-unified.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout XKG Mobile repo
      uses: actions/checkout@v4
    
    - name: Download XKG Server (private repo - use GITHUB_TOKEN)
      shell: pwsh
      run: |
        $headers = @{
          "Authorization" = "Bearer $env:GITHUB_TOKEN"
          "Accept" = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
        }
        Write-Host "Downloading XKG Server tarball..."
        $tarballUrl = "https://api.github.com/repos/griptoad26/x-knowledge-graph/tarball/main"
        $resp = Invoke-WebRequest -Uri $tarballUrl -Headers $headers -UseBasicParsing
        [System.IO.File]::WriteAllBytes("server.tar.gz", $resp.Content)
        Write-Host "Downloaded: $([math]::Round($resp.Content.Length / 1MB, 1))MB"
        Write-Host "Extracting..."
        Expand-Archive -Path server.tar.gz -DestinationPath . -Force
        # Find the extracted directory
        $dirs = Get-ChildItem -Directory | Where-Object { $_.Name -match 'x-knowledge-graph' }
        if ($dirs) {
            $dir = $dirs | Select-Object -First 1
            Write-Host "Found directory: $($dir.Name)"
            Move-Item $dir.Name xkg-server -Force
        }
        if (Test-Path "xkg-server\start_waitress.py") {
            Write-Host "SUCCESS: xkg-server ready"
        } else {
            Write-Host "ERROR: xkg-server not ready"
            Get-ChildItem -Directory | ForEach-Object { Write-Host "Dir: $($_.Name)" }
            exit 1
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: |
        flutter pub get
        pip install --timeout=120 flask flask-cors waitress pyinstaller networkx pandas numpy requests
    
    - name: Build Flutter Windows
      run: flutter build windows --release
    
    - name: Build XKG Server EXE
      shell: pwsh
      run: |
        if (!(Test-Path "xkg-server\start_waitress.py")) {
            Write-Host "ERROR: xkg-server missing"
            exit 1
        }
        Write-Host "Building XKG Server..."
        Set-Location xkg-server
        pyinstaller --onefile --name XKnowledgeGraphServer --hidden-import flask --hidden-import flask_cors --hidden-import waitress --hidden-import werkzeug --hidden-import jinja2 --hidden-import markupsafe --hidden-import networkx --hidden-import pandas --hidden-import numpy --hidden-import requests start_waitress.py
        Set-Location ..
        if (Test-Path "xkg-server\dist\XKnowledgeGraphServer.exe") {
            $size = [math]::Round((Get-Item "xkg-server\dist\XKnowledgeGraphServer.exe").Length / 1MB, 1)
            Write-Host "Server EXE built: ${size}MB"
        } else {
            Write-Host "ERROR: Server exe not found"
            exit 1
        }
    
    - name: Package Bundle
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path xkg-desktop-bundle | Out-Null
        Get-ChildItem build/windows/x64/runner/Release -Recurse -ErrorAction SilentlyContinue | Copy-Item -Destination xkg-desktop-bundle\ -ErrorAction SilentlyContinue
        Copy-Item "xkg-server\dist\XKnowledgeGraphServer.exe" xkg-desktop-bundle\
        Copy-Item "xkg-server\start_waitress.py" xkg-desktop-bundle\
        
        "@`n@echo off`nstart `"`" XKnowledgeGraphServer.exe`necho Started on port 18050`npause`n"@ | Out-File -FilePath xkg-desktop-bundle\START-SERVER.bat -Encoding ASCII
        "@`n@echo off`nstart `"`" xkg_mobile.exe`npause`n"@ | Out-File -FilePath xkg-desktop-bundle\START-APP.bat -Encoding ASCII
        "@`nXKG Desktop`n1. START-SERVER.bat`n2. START-APP.bat`n"@ | Out-File -FilePath xkg-desktop-bundle\README.txt -Encoding ASCII
        
        Get-ChildItem xkg-desktop-bundle | Format-Table Name, @{N='MB';E={[math]::Round($_.Length/1MB,2)}} -AutoSize
    
    - name: Upload bundle
      uses: actions/upload-artifact@v4
      with:
        name: xkg-desktop-windows-bundle
        path: xkg-desktop-bundle/**
        retention-days: 30
