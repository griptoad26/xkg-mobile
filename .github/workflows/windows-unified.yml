name: Build XKG Windows Desktop (Unified Bundle)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout XKG Mobile repo
      uses: actions/checkout@v4
    
    - name: Download XKG Server source
      run: |
        git clone https://github.com/griptoad26/x-knowledge-graph.git xkg-server
      continue-on-error: true
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        cache-dir: C:\flutter\.pub-cache
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install Flutter deps
      run: |
        flutter pub get
    
    - name: Install Python deps
      run: |
        pip install flask flask-cors waitress pyinstaller networkx pandas numpy requests
    
    - name: Build Flutter Windows
      run: |
        flutter build windows --release
      env:
        FLUTTER_ROOT: C:\flutter
    
    - name: Build XKG Server EXE
      run: |
        pip install flask flask-cors waitress requests networkx pandas numpy
        if exist "xkg-server" (
          cd xkg-server
          pyinstaller --onefile --name XKnowledgeGraphServer ^
            --add-data "frontend;frontend" ^
            --add-data "core;core" ^
            --hidden-import flask ^
            --hidden-import flask_cors ^
            --hidden-import waitress ^
            --hidden-import werkzeug ^
            --hidden-import jinja2 ^
            --hidden-import markupsafe ^
            --hidden-import networkx ^
            --hidden-import pandas ^
            --hidden-import numpy ^
            --hidden-import requests ^
            start_waitress.py
        )
      continue-on-error: true
    
    - name: Package Bundle
      shell: bash
      run: |
        mkdir -p xkg-desktop-bundle
        cp -r build/windows/x64/runner/Release/* xkg-desktop-bundle/ 2>/dev/null || true
        cp xkg-server/dist/XKnowledgeGraphServer.exe xkg-desktop-bundle/ 2>/dev/null || true
        cp xkg-server/start_waitress.py xkg-desktop-bundle/ 2>/dev/null || true
        
        cat > xkg-desktop-bundle/START-HERE.bat << 'BATEOF'
        @echo off
        echo ========================================
        echo   XKG Desktop - Knowledge Graph
        echo ========================================
        echo.
        echo 1. Run START-SERVER.bat first
        echo 2. Then run START-APP.bat
        echo.
        pause
        BATEOF
        
        cat > xkg-desktop-bundle/START-SERVER.bat << 'BATEOF'
        @echo off
        if exist "XKnowledgeGraphServer.exe" (
            start "" XKnowledgeGraphServer.exe
            echo XKG Server started on port 18050
        ) else (
            echo XKG Server exe not found. Install Python and run:
            echo   pip install flask flask-cors waitress networkx pandas numpy
            echo   python start_waitress.py
        )
        pause
        BATEOF
        
        cat > xkg-desktop-bundle/START-APP.bat << 'BATEOF'
        @echo off
        start "" xkg_mobile.exe
        echo XKG App launched!
        pause
        BATEOF
        
        cat > xkg-desktop-bundle/README.txt << 'TXTEOF'
        XKG Desktop Bundle
        ==================
        1. Run START-SERVER.bat to start the knowledge graph server on port 18050
        2. Run START-APP.bat to launch the XKG desktop app
        3. App connects to server at http://localhost:18050
        TXTEOF
        
        du -sh xkg-desktop-bundle/
        find xkg-desktop-bundle/ -type f 2>/dev/null | head -20
    
    - name: Upload bundle
      uses: actions/upload-artifact@v4
      with:
        name: xkg-desktop-windows-bundle
        path: xkg-desktop-bundle/**
        retention-days: 30
